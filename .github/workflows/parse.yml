name: Parse RGG Interactions

on:
  push:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Parse interactions
        run: |
          curl -s -X POST "${{ secrets.PARSE_URL }}/api/parse" \
            -H "Authorization: Bearer ${{ secrets.PARSE_SECRET }}" \
            -H "Content-Type: application/json"

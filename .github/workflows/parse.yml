name: Parse RGG Interactions

on:
  schedule:
    - cron: "* * * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  parse:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '* * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Parse interactions
        run: |
          curl -s -X POST "${{ secrets.PARSE_URL }}/api/parse" \
            -H "Authorization: Bearer ${{ secrets.PARSE_SECRET }}" \
            -H "Content-Type: application/json"

  parse-game-data:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Parse game data (wheels, items, rolls, effects, events)
        run: |
          curl -s -X POST "${{ secrets.PARSE_URL }}/api/parse-game-data" \
            -H "Authorization: Bearer ${{ secrets.PARSE_SECRET }}" \
            -H "Content-Type: application/json"

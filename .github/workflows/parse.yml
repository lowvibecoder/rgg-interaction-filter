name: Parse RGG Data

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Parse interactions
        run: |
          curl -s -X POST "${{ secrets.PARSE_URL }}/api/parse" \
            -H "Authorization: Bearer ${{ secrets.PARSE_SECRET }}" \
            -H "Content-Type: application/json"

  parse-inventories:
    runs-on: ubuntu-latest
    steps:
      - name: Parse inventories
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.PARSE_URL }}/api/parse-inventories" \
            -H "Authorization: Bearer ${{ secrets.PARSE_SECRET }}" \
            -H "Content-Type: application/json")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success"' || exit 1
